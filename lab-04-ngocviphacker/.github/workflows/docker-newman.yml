name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container
        run: |
          docker run -d --rm \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04

      - name: Give container time to initialize
        run: sleep 5

      - name: Wait for service health (poll and dump logs on failure)
        run: |
          echo "Waiting for service health (up to 120s)..."
          START=$(date +%s)
          TIMEOUT=120
          until curl -sSf http://localhost:8000/health >/dev/null 2>&1; do
            now=$(date +%s)
            elapsed=$((now-START))
            if [ $elapsed -ge $TIMEOUT ]; then
              echo "Timeout waiting for /health after ${TIMEOUT}s"
              echo "=== docker ps -a ==="
              docker ps -a || true
              echo "=== docker logs fit4110-iot-lab04 ==="
              docker logs fit4110-iot-lab04 || true
              exit 1
            fi
            sleep 2
          done
          echo "/health is UP"

      - name: Run Newman against Docker container
        run: npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== docker ps -a ==="
          docker ps -a || true
          echo "=== docker logs fit4110-iot-lab04 ==="
          docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
