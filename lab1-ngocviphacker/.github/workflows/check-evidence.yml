name: Check Session 01 Evidence

on:
  push:
  pull_request:

jobs:
  check-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required evidence files
        run: |
          required_files=(
            "evidence/buoi-01/README.md"
            "evidence/buoi-01/checklist.md"
            "evidence/buoi-01/known-issues.md"
            "evidence/buoi-01/tool-versions.txt"
            "evidence/buoi-01/docker-version.txt"
            "evidence/buoi-01/compose-version.txt"
            "evidence/buoi-01/hello-world.txt"
            "evidence/buoi-01/smoke-test-result.txt"
            "evidence/buoi-01/image-list.txt"
            "evidence/buoi-01/git-log.txt"
            "evidence/buoi-01/service-boundary.md"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done

          echo "All required evidence files are present."

      - name: Check service boundary content
        run: |
          file="evidence/buoi-01/service-boundary.md"

          required_keywords=(
            "Actor"
            "Boundary"
            "Service"
            "Input"
            "Output"
            "API"
          )

          for keyword in "${required_keywords[@]}"; do
            if ! grep -qi "$keyword" "$file"; then
              echo "service-boundary.md is missing section or keyword: $keyword"
              exit 1
            fi
          done

          echo "service-boundary.md looks valid."

      - name: Prevent Word files
        run: |
          if find . -type f \( -name "*.doc" -o -name "*.docx" \) | grep -q .; then
            echo "Do not submit Word files. Please use Markdown."
            exit 1
          fi

          echo "No Word files found."
